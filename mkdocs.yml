site_name: valgebra
site_description: Fast runtime validation through a complete Boolean algebra of schemas.
site_url: https://ppigazzini.github.io/valgebra/
repo_url: https://github.com/ppigazzini/valgebra
repo_name: ppigazzini/valgebra
copyright: Dual-licensed MIT OR Apache-2.0

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started:
      - Installation: installation.md
      - Tutorial: tutorial.md
      - Quickstart: quickstart.md
  - Guides:
      - Schema language: schema-language.md
      - The Boolean algebra: algebra.md
      - Refinements: refinements.md
      - Recursive schemas: recursion.md
      - JSON input: json.md
      - Error model: error-model.md
      - Performance: performance.md
  - Explanation:
      - Foundations: foundations.md
      - Decidability boundary: decidability.md
  - Reference:
      - API reference: api.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [python]
          options:
            docstring_style: google
            show_root_heading: true
            show_root_full_path: false
            show_source: false
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true
            members_order: source
            # Hide dunder and private members; the public API has none.
            filters: ["!^_"]
            heading_level: 3
            show_symbol_type_heading: true
            show_symbol_type_toc: true
