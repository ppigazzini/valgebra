name: Release

# Build the wheel matrix and the sdist, and publish them to a package index.
# Publishing happens only on a manual dispatch that selects a target index and
# confirms the version; no tag push can publish. Uploads use trusted publishing
# (OIDC, no stored token) and carry PEP 740 attestations. A dispatch with the
# target left at "none" builds the artifacts without publishing, for a dry run.
on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Index to publish to; none builds artifacts only"
        type: choice
        options: [none, testpypi, pypi]
        default: none
      confirm_version:
        description: "Exact version to publish (must match the built wheels)"
        type: string
        default: ""
      attach_github_release:
        description: "Attach the built wheels to a GitHub pre-release for off-index installs"
        type: boolean
        default: false

# Serialize releases: never let two dispatches build or publish at once, and
# never cancel a run mid-publish (a half-finished upload is worse than a wait).
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  wheels:
    name: wheels (${{ matrix.platform.runner }} ${{ matrix.platform.target }} ${{ matrix.platform.manylinux || 'native' }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        # `pgo: true` adds profile-guided optimization on top of the release
        # profile, a measured ~30-45% faster on the validation hot paths.
        # Recording a profile means *running* the instrumented build, so PGO
        # applies only where the build host executes its own output: the glibc
        # Linux (x86_64 and aarch64), macOS, and Windows x64 runners. Two
        # targets ship a plain (non-profiled) release build instead, with the
        # same platform compatibility: the Windows arm64 wheel, whose
        # instrumentation profile fails to merge on that toolchain, and the
        # musllinux wheels, which cross-build in a glibc container that cannot
        # run a musl-linked extension to train a profile. Native musl PGO is
        # possible in an Alpine container but is deliberately out of scope,
        # matching the reference build toolchain.
        platform:
          - { runner: ubuntu-latest, target: x86_64, pgo: true }
          - { runner: ubuntu-24.04-arm, target: aarch64, pgo: true }
          - { runner: ubuntu-latest, target: x86_64, manylinux: musllinux_1_2 }
          - { runner: ubuntu-latest, target: aarch64, manylinux: musllinux_1_2 }
          # macos-15-intel is the last GitHub-hosted x86_64 macOS image (macOS
          # 15, available through August 2027); it replaces the retired
          # macos-13. The arm64 build below runs on macos-latest.
          - { runner: macos-15-intel, target: x86_64, pgo: true }
          - { runner: macos-latest, target: aarch64, pgo: true }
          - { runner: windows-latest, target: x64, pgo: true }
          - { runner: windows-11-arm, target: aarch64 }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # PGO merges profiles with llvm-profdata, from the llvm-tools component.
      # On the host-built targets (macOS, Windows) add it to the host toolchain;
      # the Linux builds add it inside the manylinux container via
      # before-script-linux below.
      - if: ${{ matrix.platform.pgo && runner.os != 'Linux' }}
        run: rustup component add llvm-tools
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: build
          target: ${{ matrix.platform.target }}
          # --find-interpreter builds for every CPython the image exposes that
          # satisfies requires-python, including the free-threaded build where
          # present. --pgo (native targets only) runs the training workload
          # configured in pyproject.toml against the instrumented build.
          args: --release --out dist --find-interpreter ${{ matrix.platform.pgo && '--pgo' || '' }}
          manylinux: ${{ matrix.platform.manylinux || 'auto' }}
          # llvm-tools inside the manylinux container for the PGO profile merge.
          before-script-linux: ${{ matrix.platform.pgo && 'rustup component add llvm-tools' || '' }}
          # A released wheel must never trust a cached compile.
          sccache: "false"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}-${{ matrix.platform.manylinux || 'native' }}
          path: dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: dist

  github-release:
    name: attach wheels to a github pre-release
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    # A dispatch can attach the built artifacts to a deletable GitHub
    # pre-release so the exact wheels install by their asset URL with no package
    # index. The pre-release tag is a build marker (build-<version>-<run>), not
    # a version tag, and triggers nothing: no workflow listens for tag pushes.
    if: ${{ inputs.attach_github_release }}
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Cut a pre-release carrying the built wheels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          wheel="$(ls dist/*.whl 2>/dev/null | head -n1 || true)"
          if [ -z "$wheel" ]; then
            echo "::error::no wheels found in dist/"; exit 1
          fi
          version="$(basename "$wheel")"; version="${version#valgebra-}"; version="${version%%-*}"
          tag="build-${version}-${{ github.run_number }}"
          notes="Unofficial build of valgebra ${version} for off-index testing."
          notes="${notes} Install a wheel matching the target platform by its"
          notes="${notes} asset URL, e.g. uv pip install <asset-url>. Not"
          notes="${notes} published to any package index."
          gh release create "$tag" dist/* \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "valgebra ${version} (build ${{ github.run_number }})" \
            --notes "$notes" \
            --prerelease

  publish:
    name: publish to ${{ inputs.publish_target }}
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    # Publishing requires a deliberate dispatch that selects a real index. A
    # dry-run dispatch (target "none") uploads nothing, and no tag reaches here.
    if: ${{ inputs.publish_target != 'none' }}
    # The deployment environment that holds the trusted-publisher binding for
    # the selected index; create the pypi and testpypi environments in the
    # repository settings, with required reviewers, before the first release.
    environment:
      name: ${{ inputs.publish_target }}
      url: ${{ inputs.publish_target == 'pypi' && 'https://pypi.org/p/valgebra' || 'https://test.pypi.org/p/valgebra' }}
    permissions:
      # OIDC token for trusted publishing, and attestation signing for PEP 740.
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Confirm the requested version matches the built artifacts
        # A publish must name the exact version it ships; an empty input or a
        # mismatch aborts before anything is uploaded.
        run: |
          set -euo pipefail
          wheel="$(ls dist/*.whl 2>/dev/null | head -n1 || true)"
          if [ -z "$wheel" ]; then
            echo "::error::no wheels found in dist/"; exit 1
          fi
          built="$(basename "$wheel")"; built="${built#valgebra-}"; built="${built%%-*}"
          echo "built artifacts are version $built"
          if [ -z "${{ inputs.confirm_version }}" ]; then
            echo "::error::confirm_version is required to publish"; exit 1
          fi
          if [ "$built" != "${{ inputs.confirm_version }}" ]; then
            echo "::error::confirm_version '${{ inputs.confirm_version }}' != built version '$built'"; exit 1
          fi
      - name: Refuse to publish a version already on the index
        # The hardcoded baked-in version means an unbumped re-run would otherwise
        # upload nothing and report success; assert the version is absent from the
        # target index first, so a stale release fails loudly instead.
        if: inputs.publish_target != 'none'
        run: |
          set -euo pipefail
          wheel="$(ls dist/*.whl | head -n1)"
          built="$(basename "$wheel")"; built="${built#valgebra-}"; built="${built%%-*}"
          base="${{ inputs.publish_target == 'testpypi' && 'https://test.pypi.org' || 'https://pypi.org' }}"
          code="$(curl -sS -o /dev/null -w '%{http_code}' "$base/pypi/valgebra/$built/json")"
          if [ "$code" = "200" ]; then
            echo "::error::version $built is already on $base; bump the version before publishing"
            exit 1
          fi
          echo "version $built is not on $base (HTTP $code); proceeding"
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          # The selected index. Trusted publishing needs no token; attestations
          # are generated by default. skip-existing is off: the pre-publish check
          # already refuses a version on the index, so a duplicate upload is a
          # real error, not something to absorb into a green run.
          repository-url: ${{ inputs.publish_target == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
          skip-existing: false
