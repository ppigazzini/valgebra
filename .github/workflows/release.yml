name: Release

# Build the wheel matrix and the sdist, and publish them to a package index.
# Publishing happens only on a manual dispatch that selects a target index and
# confirms the version; no tag push can publish. Uploads use trusted publishing
# (OIDC, no stored token) and carry PEP 740 attestations. A dispatch with the
# target left at "none" builds the artifacts without publishing, for a dry run.
on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Index to publish to; none builds artifacts only"
        type: choice
        options: [none, testpypi, pypi]
        default: none
      confirm_version:
        description: "Exact version to publish (must match the built wheels)"
        type: string
        default: ""
      attach_github_release:
        description: "Attach the built wheels to a GitHub pre-release for off-index installs"
        type: boolean
        default: false

# Serialize releases: never let two dispatches build or publish at once, and
# never cancel a run mid-publish (a half-finished upload is worse than a wait).
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  wheels:
    name: wheels (${{ matrix.platform.runner }} ${{ matrix.platform.target }} ${{ matrix.platform.manylinux || 'native' }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        # `pgo: true` adds profile-guided optimization on top of the release
        # profile, a measured ~30-45% faster on the validation hot paths.
        # Recording a profile means *running* the instrumented build, so PGO
        # applies only where the build host executes its own output: the glibc
        # Linux (x86_64 and aarch64), macOS, and Windows x64 runners. Two
        # targets ship a plain (non-profiled) release build instead, with the
        # same platform compatibility: the Windows arm64 wheel, whose
        # instrumentation profile fails to merge on that toolchain, and the
        # musllinux wheels, which cross-build in a glibc container that cannot
        # run a musl-linked extension to train a profile. Native musl PGO is
        # possible in an Alpine container but is deliberately out of scope,
        # matching the reference build toolchain.
        platform:
          - { runner: ubuntu-latest, target: x86_64, pgo: true }
          - { runner: ubuntu-24.04-arm, target: aarch64, pgo: true }
          - { runner: ubuntu-latest, target: x86_64, manylinux: musllinux_1_2 }
          - { runner: ubuntu-latest, target: aarch64, manylinux: musllinux_1_2 }
          # macos-15-intel is the last GitHub-hosted x86_64 macOS image (macOS
          # 15, available through August 2027); it replaces the retired
          # macos-13. The arm64 build below runs on macos-latest.
          - { runner: macos-15-intel, target: x86_64, pgo: true }
          - { runner: macos-latest, target: aarch64, pgo: true }
          - { runner: windows-latest, target: x64, pgo: true }
          - { runner: windows-11-arm, target: aarch64 }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # PGO merges profiles with llvm-profdata, from the llvm-tools component.
      # On the host-built targets (macOS, Windows) add it to the host toolchain;
      # the Linux builds add it inside the manylinux container via
      # before-script-linux below.
      - if: ${{ matrix.platform.pgo && runner.os != 'Linux' }}
        run: rustup component add llvm-tools
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: build
          target: ${{ matrix.platform.target }}
          # --find-interpreter builds for every CPython the image exposes that
          # satisfies requires-python, including the free-threaded build where
          # present. --pgo (native targets only) runs the training workload
          # configured in pyproject.toml against the instrumented build.
          args: --release --out dist --find-interpreter ${{ matrix.platform.pgo && '--pgo' || '' }}
          manylinux: ${{ matrix.platform.manylinux || 'auto' }}
          # llvm-tools inside the manylinux container for the PGO profile merge.
          before-script-linux: ${{ matrix.platform.pgo && 'rustup component add llvm-tools' || '' }}
          # A released wheel must never trust a cached compile.
          sccache: "false"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}-${{ matrix.platform.manylinux || 'native' }}
          path: dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: dist

  smoke:
    name: smoke ${{ matrix.wheel.name }}
    needs: [wheels]
    # Install and import each built wheel on its own platform before anything is
    # published, so a wheel that compiles but fails to load (the "init function of
    # _valgebra returned uninitialized object" class of failure) is caught here
    # rather than after it reaches an index.
    strategy:
      fail-fast: false
      matrix:
        wheel:
          - { name: linux-x86_64, runner: ubuntu-latest, artifact: wheels-ubuntu-latest-x86_64-native }
          - { name: linux-aarch64, runner: ubuntu-24.04-arm, artifact: wheels-ubuntu-24.04-arm-aarch64-native }
          - { name: macos-x86_64, runner: macos-15-intel, artifact: wheels-macos-15-intel-x86_64-native }
          - { name: macos-arm64, runner: macos-latest, artifact: wheels-macos-latest-aarch64-native }
          - { name: windows-x64, runner: windows-latest, artifact: wheels-windows-latest-x64-native }
          - { name: windows-arm64, runner: windows-11-arm, artifact: wheels-windows-11-arm-aarch64-native }
    runs-on: ${{ matrix.wheel.runner }}
    # The two musllinux wheels are not smoked here: running them needs a musl
    # (Alpine) container with a musl interpreter, a separate lane. The glibc
    # Linux, macOS, and Windows wheels — the platforms with no other functional
    # coverage — are all exercised below.
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.wheel.artifact }}
          path: dist
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"
          # This job installs from a downloaded artifact, not a checked-out
          # dependency file, so there is nothing for the uv cache to key on.
          enable-cache: false
      - name: Install the built wheel and import it
        # Create a venv on the target interpreter, install the matching wheel from
        # the downloaded set with no index, then import and validate across the
        # object and JSON paths.
        shell: bash
        run: |
          uv venv
          uv pip install --no-index --find-links dist valgebra
          uv run python -c "import valgebra as v; assert v.Validator(int).is_valid(1); assert not v.Validator(int).is_valid('x'); assert v.Validator(list[int]).is_valid([1, 2]); assert v.Validator(int).is_valid_json('1'); print('smoke ok', v.__version__)"

  sdist-smoke:
    name: smoke sdist
    needs: [sdist]
    runs-on: ubuntu-latest
    # The source distribution is the fallback install for any platform without a
    # wheel, so build it from source and import it before it can publish: a broken
    # manifest or a missing crate file fails here rather than on a user's machine.
    steps:
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sdist
          path: dist
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"
          # This job installs from a downloaded artifact, not a checked-out
          # dependency file, so there is nothing for the uv cache to key on.
          enable-cache: false
      - name: Build the sdist from source and import it
        # Install the exact built sdist file so it is compiled from source here;
        # the package index stays available only for the build backend, never for
        # valgebra itself, which comes from the local artifact.
        shell: bash
        run: |
          uv venv
          uv pip install dist/valgebra-*.tar.gz
          uv run python -c "import valgebra as v; assert v.Validator(int).is_valid(1); assert not v.Validator(int).is_valid('x'); assert v.Validator(list[int]).is_valid([1, 2]); assert v.Validator(int).is_valid_json('1'); print('sdist smoke ok', v.__version__)"

  github-release:
    name: attach wheels to a github pre-release
    needs: [wheels, sdist, smoke, sdist-smoke]
    runs-on: ubuntu-latest
    # A dispatch can attach the built artifacts to a deletable GitHub
    # pre-release so the exact wheels install by their asset URL with no package
    # index. The pre-release tag is a build marker (build-<version>-<run>), not
    # a version tag, and triggers nothing: no workflow listens for tag pushes.
    if: ${{ inputs.attach_github_release }}
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Cut a pre-release carrying the built wheels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          wheel="$(ls dist/*.whl 2>/dev/null | head -n1 || true)"
          if [ -z "$wheel" ]; then
            echo "::error::no wheels found in dist/"; exit 1
          fi
          version="$(basename "$wheel")"; version="${version#valgebra-}"; version="${version%%-*}"
          tag="build-${version}-${{ github.run_number }}"
          notes="Unofficial build of valgebra ${version} for off-index testing."
          notes="${notes} Install a wheel matching the target platform by its"
          notes="${notes} asset URL, e.g. uv pip install <asset-url>. Not"
          notes="${notes} published to any package index."
          gh release create "$tag" dist/* \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "valgebra ${version} (build ${{ github.run_number }})" \
            --notes "$notes" \
            --prerelease

  publish:
    name: publish to ${{ inputs.publish_target }}
    # The wheel and sdist smoke must pass before anything publishes: a broken wheel fails
    # its import here and blocks the upload.
    needs: [wheels, sdist, smoke, sdist-smoke]
    runs-on: ubuntu-latest
    # Publishing requires a deliberate dispatch that selects a real index, from
    # the main branch: a dry-run dispatch (target "none") uploads nothing, no tag
    # reaches here, and a dispatch from a topic branch cannot publish a commit the
    # merge gate never blessed.
    if: ${{ inputs.publish_target != 'none' && github.ref == 'refs/heads/main' }}
    # The deployment environment that holds the trusted-publisher binding for
    # the selected index; create the pypi and testpypi environments in the
    # repository settings, with required reviewers, before the first release.
    environment:
      name: ${{ inputs.publish_target }}
      url: ${{ inputs.publish_target == 'pypi' && 'https://pypi.org/p/valgebra' || 'https://test.pypi.org/p/valgebra' }}
    permissions:
      # OIDC token for trusted publishing, and attestation signing for PEP 740.
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Confirm the requested version matches the built artifacts
        # A publish must name the exact version it ships; an empty input or a
        # mismatch aborts before anything is uploaded. The dispatch input is read
        # through the environment, never expanded into the script text.
        env:
          CONFIRM_VERSION: ${{ inputs.confirm_version }}
        run: |
          set -euo pipefail
          wheel="$(ls dist/*.whl 2>/dev/null | head -n1 || true)"
          if [ -z "$wheel" ]; then
            echo "::error::no wheels found in dist/"; exit 1
          fi
          built="$(basename "$wheel")"; built="${built#valgebra-}"; built="${built%%-*}"
          echo "built artifacts are version $built"
          if [ -z "$CONFIRM_VERSION" ]; then
            echo "::error::confirm_version is required to publish"; exit 1
          fi
          if [ "$built" != "$CONFIRM_VERSION" ]; then
            echo "::error::confirm_version '$CONFIRM_VERSION' != built version '$built'"; exit 1
          fi
      - name: Refuse to publish a stale or already-published version
        # Fail closed. The baked-in version means an unbumped re-run must not slip
        # through, and a flaky index must not be read as "absent". Proceed only on
        # a definitive 404 (absent); a 200 (present) is a stale re-publish; any
        # other response (5xx/429/network) leaves it unconfirmed, so abort rather
        # than wave it through. Then also assert the version differs from the
        # index's current latest, so an ungated re-run cannot publish even on a
        # brief per-version inconsistency. The enclosing job already gates on the
        # target, so no step-level condition is needed here.
        run: |
          set -euo pipefail
          wheel="$(ls dist/*.whl | head -n1)"
          built="$(basename "$wheel")"; built="${built#valgebra-}"; built="${built%%-*}"
          base="${{ inputs.publish_target == 'testpypi' && 'https://test.pypi.org' || 'https://pypi.org' }}"
          # --retry-all-errors retries transient 5xx/429 and connection failures;
          # no --fail, so a 404 is read rather than collapsed into an exit code. A
          # persistent failure yields 000, handled as unconfirmed below.
          code="$(curl -sS --retry 5 --retry-all-errors --retry-delay 2 \
            -o /dev/null -w '%{http_code}' "$base/pypi/valgebra/$built/json" || echo 000)"
          case "$code" in
            404) echo "version $built is absent from $base; proceeding" ;;
            200) echo "::error::version $built is already on $base; bump the version before publishing"; exit 1 ;;
            *) echo "::error::could not confirm version $built against $base (HTTP $code); refusing to publish"; exit 1 ;;
          esac
          # Belt and suspenders: refuse if the build matches the index's current
          # latest. A project absent from the index (first publish) yields no
          # latest, so this does not block the first release.
          latest="$(curl -sS --retry 5 --retry-all-errors --retry-delay 2 "$base/pypi/valgebra/json" \
            | python3 -c 'import sys, json; print(json.load(sys.stdin).get("info", {}).get("version", ""))' 2>/dev/null || true)"
          if [ -n "$latest" ] && [ "$built" = "$latest" ]; then
            echo "::error::version $built is already the latest release on $base; bump the version before publishing"
            exit 1
          fi
          echo "version $built differs from the latest on $base (${latest:-none}); proceeding"
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          # The selected index. Trusted publishing needs no token; attestations
          # are generated by default. skip-existing is off: the pre-publish check
          # already refuses a version on the index, so a duplicate upload is a
          # real error, not something to absorb into a green run.
          repository-url: ${{ inputs.publish_target == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
          skip-existing: false
