name: Release

# Tag-triggered release: build the wheel matrix and the sdist, then publish to
# PyPI with trusted publishing (OIDC, no stored token) and PEP 740 attestations.
# A manual run builds the artifacts without publishing, for a dry run.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  wheels:
    name: wheels (${{ matrix.platform.runner }} ${{ matrix.platform.target }} ${{ matrix.platform.manylinux || 'native' }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        # `pgo: true` builds a profile-guided-optimized wheel, a measured
        # ~30-45% faster on the validation hot paths. PGO must *run* the
        # instrumented build to record a profile, so it is enabled only on
        # targets the runner executes natively; the cross-compiled aarch64
        # targets ship portable non-PGO wheels.
        platform:
          - { runner: ubuntu-latest, target: x86_64, pgo: true }
          - { runner: ubuntu-latest, target: aarch64 }
          - { runner: ubuntu-latest, target: x86_64, manylinux: musllinux_1_2, pgo: true }
          - { runner: ubuntu-latest, target: aarch64, manylinux: musllinux_1_2 }
          - { runner: macos-13, target: x86_64, pgo: true }
          - { runner: macos-latest, target: aarch64, pgo: true }
          - { runner: windows-latest, target: x64, pgo: true }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # PGO merges profiles with llvm-profdata, from the llvm-tools component.
      # On the host-built targets (macOS, Windows) add it to the host toolchain;
      # the Linux builds add it inside the manylinux container via
      # before-script-linux below.
      - if: ${{ matrix.platform.pgo && runner.os != 'Linux' }}
        run: rustup component add llvm-tools
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: build
          target: ${{ matrix.platform.target }}
          # --find-interpreter builds for every CPython the image exposes that
          # satisfies requires-python, including the free-threaded build where
          # present. --pgo (native targets only) runs the training workload
          # configured in pyproject.toml against the instrumented build.
          args: --release --out dist --find-interpreter ${{ matrix.platform.pgo && '--pgo' || '' }}
          manylinux: ${{ matrix.platform.manylinux || 'auto' }}
          # llvm-tools inside the manylinux container for the PGO profile merge.
          before-script-linux: ${{ matrix.platform.pgo && 'rustup component add llvm-tools' || '' }}
          # A released wheel must never trust a cached compile.
          sccache: "false"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}-${{ matrix.platform.manylinux || 'native' }}
          path: dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: dist

  publish:
    name: publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    # Only a real tag push publishes; a manual dispatch is a build-only dry run.
    if: startsWith(github.ref, 'refs/tags/')
    # The deployment environment that holds the PyPI trusted-publisher binding;
    # create it in the repository settings before the first release.
    environment:
      name: pypi
      url: https://pypi.org/p/valgebra
    permissions:
      # OIDC token for trusted publishing, and attestation signing for PEP 740.
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          # Trusted publishing needs no token; attestations are generated by
          # default. skip-existing lets a re-run of an already-published version
          # succeed instead of failing.
          skip-existing: true
