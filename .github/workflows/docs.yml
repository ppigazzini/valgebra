name: Docs

# Build the documentation site and publish it to GitHub Pages with the
# Actions-based deployment (an uploaded artifact deployed over OIDC — no
# gh-pages branch). The site tracks the main branch; a manual run republishes
# on demand. One-time setup: in the repository, set
# Settings -> Pages -> Build and deployment -> Source to "GitHub Actions".
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege by default; the Pages-specific permissions are granted only to
# the jobs that need them (below), not to every job in the workflow.
permissions:
  contents: read

# One Pages deployment at a time; never cancel a publish already in flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # configure-pages and upload-pages-artifact need to write the Pages artifact.
    permissions:
      contents: read
      pages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - run: uv sync --group docs
      # mkdocstrings imports the package to read its docstrings.
      - run: uv run --group docs maturin develop --uv
      # --strict fails the build on a broken link or an unresolved reference.
      - run: uv run --group docs mkdocs build --strict
      # mkdocs builds into ./site (upload-pages-artifact defaults to ./_site).
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # deploy-pages publishes the artifact and mints the OIDC token Pages verifies.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
