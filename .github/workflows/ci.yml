name: CI

on:
  push:
    branches: [main, github_ci]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-lint:
    name: rust lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  rust-test:
    name: rust test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # The default feature set keeps the binding test binary from linking an
      # embedded interpreter, so this lane stays Python-free across every OS. The
      # interpreter-backed binding tests run under the binding-coverage lane.
      - run: cargo test --workspace

  rust-msrv:
    name: rust msrv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Read MSRV from workspace manifest
        id: msrv
        run: |
          version=$(grep -m1 -oP 'rust-version\s*=\s*"\K[^"]+' Cargo.toml)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "MSRV is $version"
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --workspace

  rust-coverage:
    name: rust coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-nextest,cargo-llvm-cov
      # Run the workspace tests under nextest and report the coverage summary.
      - run: cargo llvm-cov nextest --workspace --summary-only

  binding-coverage:
    name: binding coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-llvm-cov
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      # Binding coverage combines two drivers under one instrumentation
      # environment: the Python suite exercising the extension, and the
      # binding-internal Rust unit tests (interner, index remap, fast-path
      # decision) that need an embedded interpreter. The whole flow runs in one
      # shell so the coverage environment survives across the build and runs.
      - name: Measure binding coverage via the Python suite and Rust unit tests
        run: |
          cargo llvm-cov clean --workspace
          source <(cargo llvm-cov show-env --export-prefix)
          uv sync --no-install-project
          uv run maturin develop --uv
          uv run pytest --deselect tests/test_concurrency.py
          # The interpreter-backed Rust tests link libpython, so point pyo3 at the
          # uv interpreter and put its library directory on the loader path.
          export PYO3_PYTHON="$(uv run python -c 'import sys; print(sys.executable)')"
          libdir="$("$PYO3_PYTHON" -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR") or "")')"
          LD_LIBRARY_PATH="$libdir:$LD_LIBRARY_PATH" \
            cargo test -p valgebra-py --features interpreter-tests
          # Scope the floor to the binding crate: the instrumented build also
          # covers valgebra-core (the .so links it), but the core has its own
          # coverage lane, so including it here would dilute the binding number.
          cargo llvm-cov report --summary-only \
            --ignore-filename-regex 'valgebra-core' --fail-under-lines 95

  python:
    name: python ${{ matrix.python-version }}
    # 3.15 (prerelease) and 3.14t (free-threaded) are early-warning lanes: they
    # run but never block merges. Free-threaded CPython is a monitoring target
    # until the references audit calls PyO3 free-threading support stable.
    continue-on-error: ${{ matrix.python-version == '3.15' || matrix.python-version == '3.14t' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t", "3.15"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dev dependencies
        run: uv sync --no-install-project
      - name: Build the extension into the venv
        run: uv run maturin develop --uv
      # Coverage over the Python package surface is gated at 100% (configured in
      # pyproject.toml); the compiled extension's coverage is the separate
      # binding-coverage lane.
      - name: pytest
        env:
          HYPOTHESIS_PROFILE: ci
        run: uv run pytest --cov=valgebra --cov-report=term-missing
      # ruff and ty are static and pinned to a target version, so their result
      # does not depend on the runner's Python; run them once on the floor.
      - name: Ruff lint
        if: ${{ matrix.python-version == '3.10' }}
        run: uv run ruff check .
      - name: Ruff format
        if: ${{ matrix.python-version == '3.10' }}
        run: uv run ruff format --check .
      - name: ty type check
        if: ${{ matrix.python-version == '3.10' }}
        run: uv run ty check

  differential:
    name: differential
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Install the differential oracles
        run: uv sync --group bench
      - name: Build the extension into the venv
        run: uv run --group bench maturin develop --uv
      # Run the same schemas and values through valgebra and through
      # pydantic-core and jsonschema; the environment flag turns a missing oracle
      # into a hard failure so the gate cannot pass by silently skipping.
      - name: Cross-check membership against pydantic-core and jsonschema
        env:
          VALGEBRA_REQUIRE_DIFFERENTIAL: "1"
          HYPOTHESIS_PROFILE: ci
        run: uv run --group bench pytest tests/test_differential.py

  doc-examples:
    name: doc examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run maturin develop --uv
      # Execute every runnable example in the README and the docs site; fail on
      # a stale snippet.
      - run: uv run python scripts/run_doc_examples.py

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync --group docs
      # mkdocstrings imports the package to read its docstrings.
      - run: uv run --group docs maturin develop --uv
      # --strict fails the build on a broken link or an unresolved reference.
      - run: uv run --group docs mkdocs build --strict

  bench:
    name: bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          # llvm-tools merges the profile-guided-optimization profiles.
          components: llvm-tools
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync --no-install-project --group bench
      # The wall-clock benches must measure the shipped artifact, not a debug
      # build, so build the release wheel with LTO and profile-guided
      # optimization exactly as the release workflow does, then install it in
      # place of an editable build. Every step below runs with --no-sync so uv
      # never reinstalls the editable project over the optimized wheel.
      - name: Build and install the optimized wheel
        run: |
          uv run --no-sync --group bench maturin build --release --pgo --out dist
          uv pip install --no-deps --reinstall dist/*.whl
      # Deterministic instruction-count regression gate: cachegrind over the
      # fixed core workload, compared against the committed budget. Independent
      # of runner noise, so it blocks merges; a wall-clock budget could not.
      - name: Instruction-count regression gate
        run: uv run --no-sync python scripts/perf_gate.py
      # The same gate for the binding hot path: the membership walk over a live
      # Python value, which the pure-Rust core workload does not reach. The
      # workload embeds the interpreter, so PYO3_PYTHON selects it at build time
      # and its library directory goes on the loader path at run time; the gate
      # subtracts two iteration counts so the interpreter startup cancels.
      - name: Binding-path instruction-count regression gate
        run: |
          py="$(uv run --no-sync python -c 'import sys; print(sys.executable)')"
          libdir="$(uv run --no-sync python -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))')"
          PYO3_PYTHON="$py" LD_LIBRARY_PATH="$libdir:${LD_LIBRARY_PATH:-}" \
            uv run --no-sync python scripts/perf_gate.py --binding
      # Smoke-run the wall-clock benches once (timing disabled) so the suites
      # keep working; their numbers are recorded by hand in the performance
      # page. The files are named bench_*, so override the collection pattern.
      - name: Smoke-run the benchmarks
        run: >
          uv run --no-sync --group bench pytest benches/
          -o python_files="bench_*.py" --benchmark-disable -q
      # Competitive regression gate: the per-shape ratio of valgebra to
      # pydantic-core, measured on the optimized wheel. A ratio cancels the
      # runner's absolute speed, so it gates on the merge path where an absolute
      # wall-clock budget could not.
      - name: Competitive comparison gate
        run: uv run --no-sync --group bench python scripts/compare_gate.py

  wheel:
    name: wheel (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: build
          # --find-interpreter builds for every CPython in the manylinux image
          # that satisfies requires-python; without it maturin looks only for a
          # `python3` on PATH, which the manylinux container does not provide.
          args: --release --out dist --find-interpreter
          manylinux: auto
          # The manylinux container is opaque to Swatinem/rust-cache, so this
          # release build is otherwise uncached. sccache caches compilation via
          # the GitHub Actions cache, cutting warm rebuilds. Disabled on tag
          # pushes so a release wheel never trusts a cached artifact.
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-linux
          path: dist

  # Single required check for branch protection: green only if every job above
  # succeeds. Mirrors the ruff required-checks and pydantic check aggregators.
  nightly-fuzz:
    name: nightly deep fuzz
    # The hole-hunting property suites at the deep example budget. Scheduled and
    # manual only, and never a merge gate: it is an early-warning lane.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install dev dependencies
        run: uv sync --no-install-project
      - name: Build the extension into the venv
        run: uv run maturin develop --uv
      - name: Deep property suite
        env:
          HYPOTHESIS_PROFILE: nightly
        run: >
          uv run pytest
          tests/test_completeness_ledger.py
          tests/test_metamorphic.py
          tests/test_decision_adversarial.py
          tests/test_denotation.py
          tests/test_laws.py
          tests/test_subtyping.py
          tests/test_recursion.py
          tests/test_real_world_corpus.py

  nightly-libfuzzer:
    name: nightly libfuzzer
    # Coverage-guided fuzzing of the core algebra and decision procedures with
    # libFuzzer, seeded from the committed corpus. Scheduled and manual only: a
    # crash fails the lane, but the soak runs off the merge path. The order laws
    # it asserts are mirrored on the merge gate by the structural property tests.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: fuzz
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Fuzz the simplifier
        run: cargo fuzz run simplify fuzz/seeds/simplify -- -max_total_time=180
      - name: Fuzz the decision procedures
        run: cargo fuzz run decision fuzz/seeds/decision -- -max_total_time=180
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts

  nightly-mutants:
    name: nightly mutation sweep
    # cargo-mutants over the core, auditing whether the Rust unit tests register
    # an injected defect. Scheduled and manual only, never a merge gate: surviving
    # mutants are an early-warning signal of a test gap, surfaced in the job
    # summary rather than failing the lane. A broken baseline or a usage error
    # still fails, because those are real breakage unrelated to test coverage.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      - name: Mutation sweep over the core
        run: |
          # cargo-mutants exit codes: 0 clean, 2 missed mutants, 3 timeouts,
          # 1 usage error, 4 baseline build/test failure. Missed mutants and
          # timeouts are test-gap signals reported in the summary without
          # failing the lane; a usage error or a broken baseline fails it.
          set +e
          cargo mutants --package valgebra-core -j 4
          status=$?
          set -e

          report() {
            echo "## Mutation sweep over the core"
            echo
            missed=0 caught=0 timeout=0 unviable=0
            [ -f mutants.out/missed.txt ] && missed=$(wc -l < mutants.out/missed.txt)
            [ -f mutants.out/caught.txt ] && caught=$(wc -l < mutants.out/caught.txt)
            [ -f mutants.out/timeout.txt ] && timeout=$(wc -l < mutants.out/timeout.txt)
            [ -f mutants.out/unviable.txt ] && unviable=$(wc -l < mutants.out/unviable.txt)
            echo "| outcome | count |"
            echo "| --- | --- |"
            echo "| caught | $caught |"
            echo "| missed | $missed |"
            echo "| timeout | $timeout |"
            echo "| unviable | $unviable |"
            if [ "$missed" -gt 0 ]; then
              echo
              echo "<details><summary>Missed mutants ($missed)</summary>"
              echo
              echo '```'
              cat mutants.out/missed.txt
              echo '```'
              echo
              echo "</details>"
            fi
            if [ "$timeout" -gt 0 ]; then
              echo
              echo "<details><summary>Timed-out mutants ($timeout)</summary>"
              echo
              echo '```'
              cat mutants.out/timeout.txt
              echo '```'
              echo
              echo "</details>"
            fi
          }
          report >> "$GITHUB_STEP_SUMMARY"

          # Surface a dropped result as a warning annotation, not just a summary
          # table, so a missed mutant or a timed-out (unjudged) one is visible at
          # a glance rather than silently absorbed into a green lane.
          missed=0 timeout=0
          [ -f mutants.out/missed.txt ] && missed=$(wc -l < mutants.out/missed.txt)
          [ -f mutants.out/timeout.txt ] && timeout=$(wc -l < mutants.out/timeout.txt)
          if [ "$missed" -gt 0 ]; then
            echo "::warning::$missed mutant(s) survived the tests; see the job summary"
          fi
          if [ "$timeout" -gt 0 ]; then
            echo "::warning::$timeout mutant(s) timed out and were not judged; see the job summary"
          fi

          case "$status" in
            0 | 2 | 3) exit 0 ;;
            *) exit "$status" ;;
          esac

  fuzz-build:
    name: fuzz build
    # Compile-only check that the libFuzzer targets still build against the
    # current core, on every run. The fuzz workspace is detached, so the merge
    # build/clippy/test never reach it and a renamed schema variant would break a
    # target unseen until the scheduled soak; building it here fails the change
    # instead. Runs unconditionally so the aggregate gate never sees it skipped;
    # the soak (nightly-libfuzzer) still runs the fuzzers.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          # Pin nightly to a dated channel so a nightly regression cannot break
          # this merge gate through no fault of the change. Bump this date
          # periodically; Dependabot does not pin toolchains.
          toolchain: nightly-2026-06-01
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: fuzz
      # A prebuilt cargo-fuzz binary, not a from-source build: a slow compile no
      # longer delays every change, and the installed version is reproducible.
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-fuzz
      - name: Build the fuzz targets
        # Force the host (gnu) target: the prebuilt cargo-fuzz is a musl-static
        # binary and defaults the fuzz target to its own musl triple, which is not
        # installed and is incompatible with the ASAN static-libc check.
        run: cargo +nightly-2026-06-01 fuzz build --target x86_64-unknown-linux-gnu

  ci:
    name: ci
    if: always()
    needs:
      [
        rust-lint,
        rust-test,
        rust-msrv,
        rust-coverage,
        binding-coverage,
        python,
        differential,
        doc-examples,
        docs,
        bench,
        wheel,
        fuzz-build,
      ]
    runs-on: ubuntu-latest
    steps:
      # Gate on every required job having *succeeded*, so a skipped or otherwise
      # non-successful job blocks the merge rather than slipping through a check
      # that only catches failure and cancellation. Each need is listed
      # explicitly so the gate cannot silently drift from the job set.
      - name: Fail unless every required job succeeded
        if: >-
          needs.rust-lint.result != 'success' ||
          needs.rust-test.result != 'success' ||
          needs.rust-msrv.result != 'success' ||
          needs.rust-coverage.result != 'success' ||
          needs.binding-coverage.result != 'success' ||
          needs.python.result != 'success' ||
          needs.differential.result != 'success' ||
          needs.doc-examples.result != 'success' ||
          needs.docs.result != 'success' ||
          needs.bench.result != 'success' ||
          needs.wheel.result != 'success' ||
          needs.fuzz-build.result != 'success'
        run: exit 1
      - run: echo "All required jobs passed."
