version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    groups:
      cargo:
        patterns: ["*"]

  # The fuzz workspace is a detached crate with its own lockfile (libfuzzer-sys,
  # arbitrary), outside the root workspace, so it needs its own registration or
  # it rots unmonitored.
  - package-ecosystem: cargo
    directory: "/fuzz"
    schedule:
      interval: weekly
    groups:
      fuzz:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]
