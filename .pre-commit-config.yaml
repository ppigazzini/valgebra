# Pre-commit hooks for the valgebra workspace.
# Run on every commit; run the full set with: pre-commit run --all-files
# Keep hook revs in step with the pins in pyproject.toml.
minimum_pre_commit_version: "4.0.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      # The fuzz seed corpus is binary fuzzer input, not text: the whitespace and
      # newline fixers would corrupt the bytes the fuzzer replays.
      - id: end-of-file-fixer
        exclude: ^fuzz/seeds/
      - id: trailing-whitespace
        exclude: ^fuzz/seeds/
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: ^fuzz/seeds/

  # Python lint + format (Rust extension is not needed for these).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # Keep uv.lock in sync with pyproject.toml.
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.31
    hooks:
      - id: uv-lock

  # Rust gates, run through the project toolchain so they match CI exactly.
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
